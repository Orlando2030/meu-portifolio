
<!-- ========================= -->
<!-- ROOT CSS CORRIGIDO -->
<!-- ========================= -->

<style>
:root {
  --bg-main: #0f172a;
  --bg-card: #1e293b;
  --bg-alternate: #162033;
  --accent: #f59e0b;
  --accent-hover: #d97706;
  --text-main: #f8fafc;
  --text-muted: #cbd5e1;
}

body {
  font-family: 'Inter', sans-serif;
  scroll-behavior: smooth;
  background-color: var(--bg-main);
  color: var(--text-main);
  letter-spacing: -0.01em;
}

p {
  line-height: 1.8;
}

/* ========================= */
/* CARDS */
/* ========================= */

.card-project,
.card-feature {
  background-color: var(--bg-card);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  height: 100%;
  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease;
  padding: 2rem;
  backdrop-filter: blur(10px);
}

.card-project:hover,
.card-feature:hover {
  transform: translateY(-5px);
  border-color: rgba(245, 158, 11, 0.25);
  box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.5);
}

/* ========================= */
/* HERO */
/* ========================= */

.hero h1 {
  line-height: 1.1;
}

/* ========================= */
/* GITHUB CARDS */
/* ========================= */

.github-card {
  width: 100%;
  max-width: 500px;
  background-color: var(--bg-main);
  border: 1px solid rgba(255,255,255,0.05);
  padding: 1rem;
  border-radius: 12px;
  min-height: 220px;
}

/* ========================= */
/* GITHUB GRAPH */
/* ========================= */

.github-graph img {
  width: 100%;
  max-width: 900px;
  opacity: 0.9;
}

/* ========================= */
/* RESPONSIVIDADE */
/* ========================= */

@media (max-width: 768px) {
  .github-card {
    max-width: 100%;
  }
}
</style>

<!-- ========================= -->
<!-- SEÇÃO GITHUB CORRIGIDA -->
<!-- ========================= -->

<section id="github" class="py-5 bg-alternate">
  <div class="container py-4">

    <h2 class="section-title">Atividade Git</h2>

    <p 
      class="text-center mb-5"
      style="max-width: 700px; margin: 0 auto; color: var(--text-muted);"
    >
      Monitoramento em tempo real das minhas contribuições,
      repositórios mais ativos e linguagens de programação
      mais utilizadas no GitHub.
    </p>

    <div class="row justify-content-center g-4">

      <!-- GitHub Stats -->

      <div class="col-lg-6 text-center">

        <div class="github-card mx-auto d-flex align-items-center justify-content-center">

          <img
            src="https://github-readme-stats.vercel.app/api?username=orlando2030&show_icons=true&theme=transparent&hide_border=true&title_color=f59e0b&text_color=f8fafc&icon_color=f59e0b"
            alt="GitHub Stats Orlando2030"
            class="img-fluid"
          >

        </div>

      </div>

      <!-- Top Languages -->

      <div class="col-lg-6 text-center">

        <div class="github-card mx-auto d-flex align-items-center justify-content-center">

          <img
            src="https://github-readme-stats.vercel.app/api/top-langs/?username=orlando2030&layout=compact&theme=transparent&hide_border=true&title_color=f59e0b&text_color=f8fafc"
            alt="Top Linguagens Orlando2030"
            class="img-fluid"
          >

        </div>

      </div>

      <!-- Contribution Graph -->

      <div class="col-12 mt-5 text-center">

        <h4 class="h5 mb-4 text-warning">
          Gráfico Anual de Contribuições
        </h4>

        <div
          class="github-graph p-4 rounded shadow-sm d-flex justify-content-center align-items-center"
          style="
            background-color: var(--bg-main);
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
          "
        >

          <img
            src="https://ghchart.rshah.org/f59e0b/orlando2030"
            alt="Gráfico de Commits GitHub"
            class="img-fluid"
          >

        </div>

      </div>

    </div>

  </div>
</section>
